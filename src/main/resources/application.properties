# App
spring.application.name=smart-agriculture

# ✅ IMPORTANT: Dynamic port for Render
server.port=${PORT:8080}

# MongoDB (use environment variable - NOT localhost)
spring.data.mongodb.uri=${MONGO_URI}
spring.data.mongodb.database=smart_agriculture

# JWT Configuration
app.jwt.secret=SmartAgricultureSecretKey2024VeryLongSecretKeyForJWTGeneration
app.jwt.expiration=86400000

# CORS
app.cors.allowed-origins=*

# Logging
logging.level.com.agriculture=DEBUG
logging.level.org.springframework.data.mongodb=DEBUG

# AI Provider
ai.provider=${AI_PROVIDER:GEMINI}

# API Keys (DO NOT hardcode)
anthropic.api.key=${ANTHROPIC_API_KEY:}
openai.api.key=${OPENAI_API_KEY:}
gemini.api.key=${GEMINI_API_KEY}

# Models
anthropic.model=${ANTHROPIC_MODEL:claude-sonnet-4-20250514}
openai.model=${OPENAI_MODEL:gpt-4.1-mini}
gemini.model=${GEMINI_MODEL:gemini-2.5-flash}