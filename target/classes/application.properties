spring.application.name=smart-agriculture
server.port=8081

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/smart_agriculture
spring.data.mongodb.database=smart_agriculture

# JWT Configuration
app.jwt.secret=SmartAgricultureSecretKey2024VeryLongSecretKeyForJWTGeneration
app.jwt.expiration=86400000

# CORS
app.cors.allowed-origins=http://localhost:3000

# Logging
logging.level.com.agriculture=DEBUG
logging.level.org.springframework.data.mongodb=DEBUG

# Anthropic Claude AI Configuration
ai.provider=${AI_PROVIDER:GEMINI}
anthropic.api.key=${ANTHROPIC_API_KEY:YOUR_ANTHROPIC_API_KEY_HERE}
anthropic.model=${ANTHROPIC_MODEL:claude-sonnet-4-20250514}
openai.api.key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-4.1-mini}
gemini.api.key=${GEMINI_API_KEY:${GOOGLE_API_KEY:AIzaSyAzFkdr6xYHpnr9F76ILrVyekLbFyVhjl8}}
gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
